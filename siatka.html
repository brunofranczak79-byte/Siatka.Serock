<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapisy na Siatkówkę</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 5px; }
        .info { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        .status { padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .open { background: #e6f4ea; color: #1e8e3e; }
        .closed { background: #fce8e6; color: #d93025; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-join { background-color: #1a73e8; color: white; margin-bottom: 10px; }
        .btn-join:disabled { background-color: #ccc; cursor: not-allowed; }
        .list-header { border-top: 1px solid #eee; pt: 10px; margin-top: 20px; display: flex; justify-content: space-between; }
        ul { list-style: none; padding: 0; }
        li { background: #f8f9fa; margin: 5px 0; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .btn-remove { background: #ff4d4d; color: white; width: auto; padding: 5px 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏐 Siatkówka Środa</h2>
    <p class="info">Mecz: 19:30 | Max: 12 osób</p>
    
    <div id="status-box" class="status">Sprawdzanie terminu...</div>

    <input type="text" id="nameInput" placeholder="Twoje imię i nazwisko">
    <button id="joinBtn" class="btn-join" onclick="joinGame()">Zapisz się</button>

    <div class="list-header">
        <strong>Lista graczy:</strong>
        <span id="counter">0/12</span>
    </div>
    <ul id="playerList"></ul>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('volleyballPlayers')) || [];
    const maxPlayers = 12;

    function checkAvailability() {
        const now = new Date();
        const day = now.getDay(); // 0-Niedziela, 1-Pon, 2-Wtorek...
        const statusBox = document.getElementById('status-box');
        const joinBtn = document.getElementById('joinBtn');

        // Zapisy otwarte od wtorku (2) do środy (3) do godziny 19:30
        const isTuesday = (day === 2);
        const isWednesdayBeforeMatch = (day === 3 && (now.getHours() < 19 || (now.getHours() === 19 && now.getMinutes() < 30)));

        if (isTuesday || isWednesdayBeforeMatch) {
            statusBox.innerText = "Zapisy OTWARTE";
            statusBox.className = "status open";
            joinBtn.disabled = false;
        } else {
            statusBox.innerText = "Zapisy ZAMKNIĘTE (Zapraszamy we wtorek)";
            statusBox.className = "status closed";
            joinBtn.disabled = true;
        }
        renderList();
    }

    function joinGame() {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return alert("Wpisz imię!");
        if (players.length >= maxPlayers) return alert("Brak wolnych miejsc!");
        if (players.includes(name)) return alert("Już jesteś na liście!");

        players.push(name);
        saveAndRender();
        document.getElementById('nameInput').value = "";
    }

    function removePlayer(index) {
        players.splice(index, 1);
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('volleyballPlayers', JSON.stringify(players));
        renderList();
    }

    function renderList() {
        const listEl = document.getElementById('playerList');
        const counterEl = document.getElementById('counter');
        listEl.innerHTML = "";
        
        players.forEach((player, index) => {
            const li = document.createElement('li');
            li.innerHTML = `
                ${index + 1}. ${player}
                <button class="btn-remove" onclick="removePlayer(${index})">Wypisz</button>
            `;
            listEl.appendChild(li);
        });

        counterEl.innerText = `${players.length}/${maxPlayers}`;
        
        const joinBtn = document.getElementById('joinBtn');
        if(players.length >= maxPlayers) joinBtn.disabled = true;
    }

    // Odświeżaj status co minutę
    setInterval(checkAvailability, 60000);
    checkAvailability();
</script>

</body>
</html>
